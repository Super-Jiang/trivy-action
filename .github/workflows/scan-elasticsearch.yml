name: 'Scan Elasticsearch Docker Image'

on:
  workflow_dispatch:

jobs:
  scan-image:
    runs-on: ubuntu-latest
    steps:
      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.69.1
          trivy --version

      - name: Scan Elasticsearch 9.3.6 image with Trivy
        run: |
          trivy image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            elastic/elasticsearch:9.3.6
