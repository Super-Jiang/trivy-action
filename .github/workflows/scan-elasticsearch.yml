name: 'Scan Elasticsearch Docker Image'

on:
  workflow_dispatch:

jobs:
  scan-image:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Elasticsearch 9.3.6 image with Trivy (Docker)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.69.1 \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --format json \
            arm64v8/elasticsearch:8.19.17
