name: 'Scan Elasticsearch Docker Image'

on:
  workflow_dispatch:  # 你可以手动在GitHub页面点击运行，非常方便

jobs:
  scan-image:
    runs-on: ubuntu-latest
    steps:
      - name: Scan Elasticsearch 9.3.6 image with Trivy
        uses: aquasecurity/trivy-action@v0.34.0  # 推荐用这个稳定的版本
        with:
          image-ref: 'elastic/elasticsearch:9.3.6'  # 这里就是你要检查的镜像地址
          format: 'table'          # 报告以表格形式展示，直观
          exit-code: '1'           # 发现漏洞就让工作流失败，方便你发现问题
          severity: 'CRITICAL,HIGH' # 重点关注严重和高危漏洞
          ignore-unfixed: true     # 忽略还没出修复补丁的漏洞，聚焦可解决的问题
